<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | 2 Smokin' Barrels</title>
    <link rel="icon" type="image/png" href="../fav.png"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* Typography Setup */
        @font-face {
            font-family: 'RDRLino';
            src: url('../fonts/RDRLino-Regular.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }
        @font-face {
            font-family: 'Hapna';
            src: url('../fonts/HapnaSlabSerif-Regular.ttf') format('truetype');
            font-weight: 400; font-style: normal;
        }
        @font-face {
            font-family: 'Hapna';
            src: url('../fonts/HapnaSlabSerif-DemiBold.ttf') format('truetype');
            font-weight: 600; font-style: normal;
        }

        :root {
            --bg-dark: #070707;
            --card-bg: rgba(18, 18, 18, 0.85);
            --accent-red: #8b0000;
            --white-low: #ffffff;
            --white-med: #a2a2a2;
        }

        body {
            font-family: 'Hapna', sans-serif;
            background-color: var(--bg-dark);
            background-image: url('../images/bg.png');
            background-repeat: repeat;
            color: var(--white-low);
            margin: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 { font-family: 'RDRLino', serif; text-transform: uppercase; }

        /* --- SIDEBAR NAV --- */
        .menu-toggle {
            background: none; border: none; color: var(--accent-red);
            font-size: 1.2rem; cursor: pointer; padding: 0;
            display: flex; align-items: center; transition: 0.2s;
        }
        .menu-toggle:hover { filter: brightness(1.2); }

        .sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: rgba(7, 7, 7, 0.98); background-image: url('../images/bg.png');
            border-right: 2px solid var(--accent-red); z-index: 2000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 2rem; box-sizing: border-box;
        }
        .sidebar.active { left: 0; }
        .sidebar-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; border-bottom: 1px solid var(--accent-red); padding-bottom: 1rem;
        }
        .sidebar-links { display: flex; flex-direction: column; gap: 1.5rem; }
        .sidebar-links a {
            font-family: 'RDRLino', serif; color: var(--white-low);
            text-decoration: none; font-size: 1.2rem; text-transform: uppercase; transition: 0.2s;
        }
        .sidebar-links a:hover { color: var(--accent-red); padding-left: 10px; }

        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 1999;
        }
        .menu-overlay.active { display: block; }

        /* --- HEADER SECTION --- */
        .site-header { text-align: center; padding: 20px 5%; background-image: url('../images/bg.png'); background-repeat: repeat; }
        .header-logo-img { max-width: 100%; height: auto; max-height: 80px; }

        /* --- NAVIGATION (Exact Alignment Fix) --- */
        nav {
            position: sticky; top: 0;
            background-image: url('../images/bg.png'); background-repeat: repeat;
            border-top: 3px solid var(--accent-red);
            border-bottom: 3px solid var(--accent-red);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.5rem 5%; z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .nav-links { display: flex; align-items: center; gap: 1rem; }
        
        .social-icons { display: flex; align-items: center; gap: 1rem; }
        .social-icons a { display: flex; align-items: center; } 
        .social-icons a img { width: 24px; height: 24px; transition: 0.2s; filter: brightness(1); }
        .social-icons a:hover img { transform: scale(1.15); filter: brightness(0) invert(1); }

        #user-auth { margin-left: 10px; }
        #user-profile { display: none; align-items: center; gap: 8px; cursor: pointer; }
        #user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent-red); }

        /* --- CONTENT --- */
        .container { max-width: 1100px; margin: 0 auto; padding: 5rem 5%; text-align: center; }
        .coming-soon-box { background: var(--card-bg); border: 2px solid var(--accent-red); padding: 3rem; }
        .coming-soon-box h1 { font-family: 'RDRLino', serif; font-size: 3.5rem; color: var(--accent-red); margin: 0; }
        .coming-soon-box p { font-size: 1.2rem; color: var(--white-med); }

        /* --- FOOTER --- */
        footer { 
            text-align: center; padding: 3rem 1rem 3rem; border-top: 2px solid var(--accent-red);
            color: #fff; background-color: var(--bg-dark); background-image: url('../images/footer.png');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            font-size: 0.9rem; font-weight: 600; text-shadow: 2px 2px 4px rgba(0,0,0,1);
        }

        @media (min-width: 992px) { .header-logo-img { max-height: 120px; } }
    </style>
</head>
<body>

    <div class="menu-overlay" id="menuOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3 style="color: var(--accent-red); margin: 0;">Navigation</h3>
            <button class="menu-toggle" onclick="toggleSidebar()" style="padding:0; color: var(--white-low);"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-links">
            <a href="/">Home</a>
            <a href="/commands">Stream Commands</a>
            <a href="/apps">Stream Apps</a>
            <a href="/music">Royalty-Free Music</a>
            <a href="/rdo">RDO Resources</a>
            <a href="/gta">GTA Resources</a>
            <a href="https://2smokinbarrels-shop.fourthwall.com" target="_blank">Merch Store</a>
            <a href="/community">Community</a>
        </div>
    </div>

    <header class="site-header">
        <a href="/">
            <img src="../images/longlogo.png" alt="Logo" class="header-logo-img">
        </a>
    </header>

    <nav>
        <div class="nav-links">
            <button class="menu-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="social-icons">
                <a href="https://youtube.com/@2smokinbarrels" target="_blank"><img src="../icons/youtube.png" alt="YouTube"></a>
                <a href="https://discord.gg/AWC6PNA2mK" target="_blank"><img src="../icons/discord.png" alt="Discord"></a>
                <a href="https://x.com/2_SmokinBarrels" target="_blank"><img src="../icons/x.png" alt="X"></a>
                <a href="https://www.facebook.com/2smokinbarrelsgaming/" target="_blank"><img src="../icons/facebook.png" alt="Facebook"></a>
                <a href="https://www.patreon.com/c/2SmokinBarrels" target="_blank"><img src="../icons/patreon.png" alt="Patreon"></a>
                <a href="https://github.com/ironjeff80" target="_blank"><img src="../icons/github.png" alt="GitHub"></a>
            </div>
        </div>

        <div id="user-auth">
            <div id="login-button-container">
                <div id="g_id_onload"></div>
                <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
            </div>
            <div id="user-profile" onclick="signOut()" title="Click to Sign Out">
                <img id="user-avatar" src="" alt="Profile" referrerpolicy="no-referrer">
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="coming-soon-box">
            <h1>Coming Soon</h1>
            <p>We are currently building this resource for the community.</p>
            <div style="margin-top: 2rem;">
                <a href="/" style="color: var(--accent-red); text-decoration: none; font-weight: 600; text-transform: uppercase;">&larr; Back to Home</a>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 In Smokin' We Trust.</footer>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active');
        }

        window.onload = function () {
            const savedUser = localStorage.getItem('smokinUser');
            if (savedUser) {
                const userData = JSON.parse(savedUser);
                document.getElementById('login-button-container').style.display = 'none';
                document.getElementById('user-profile').style.display = 'flex';
                document.getElementById('user-avatar').src = userData.picture;
            }
        };

        function signOut() {
            if (!confirm("Do you want to sign out?")) return;
            localStorage.removeItem('smokinUser');
            location.reload();
        }
    </script>
</body>
</html>
